    name: "${device_type}-Battery equalization voltage"
    address: 99
    unit_of_measurement: V
    value_type: U_WORD
    max_value: 55.4
    min_value: 53.0
    step: 0.1
    mode: box
    lambda: "return x * 0.01;"
    write_lambda: "return x * 100;"
