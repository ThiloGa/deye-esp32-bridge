esphome:
  name: deye-multi-seplos
  friendly_name: Deye_Multi-Seplos

external_components:
  - source: ${external_components_source1}
    refresh: 0s
  - source: ${external_components_source2}
    refresh: 0s


substitutions:
  time: "10" # update interval for all data points
  bms_name: seplos-bms
  modbus_update_interval: "10s"
  settings_skipped_updates: "10"
  query_throttle: "100ms"
  device_name: deye
  device_type: sun10k
  device_description: "Esphome component for Deye sun-10k-sg04lp3"
  modbus_controller_id: sg04lp3
  external_components_source1: github://syssi/esphome-seplos-bms@main
  external_components_source2: github://DpunktS/seplos_v3_sniffer

esp32:
  board: nodemcu-32s
  framework:
    type: esp-idf

# Enable logging
logger:

globals:
   - id: helper_discharge_current
     type: int
     restore_value: yes
     initial_value: '100'
   - id: max_soc
     type: float
     restore_value: yes
     initial_value: '0.0'
   - id: target_soc
     type: float
     restore_value: yes
     initial_value: '30.0'     

# Enable Home Assistant API
api:
  encryption:
    key: ""

ota:
  - platform: esphome
    password: ""

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password

  # Enable fallback hotspot (captive portal) in case wifi connection fails
  ap:
    ssid: "Deye-Multi-Seplos"
    password: ""

time:
  - platform: sntp
    id: sntp_time
    timezone: Europe/Berlin
    servers:
    - pool.ntp.org
    on_time:
      - seconds: 0
        minutes: 0
        hours: 23
        days_of_week: MON-SUN
        then:
          - if:
              condition:
                lambda: |-
                  return id(batterylife_enabled).state;
              then:
                - lambda: |-
                    float new_target = id(target_soc);
                    if (id(max_soc) >= 95.0) {
                      new_target = new_target - 5.0;
                    } else if (id(max_soc) < 85.0) {
                      new_target = new_target + 5.0;
                    }
                    if (new_target > 85.0) {
                      new_target = 85.0;
                    }
                    if (new_target < 30.0) {
                      new_target = 30.0;
                    }
                    id(target_soc) = new_target;
                    id(max_soc) = 0.0;
                - number.set:
                    id: ${device_type}_Time_point_1_capacity
                    value: !lambda |-
                        return id(target_soc);
                - delay: 1s
                - number.set:
                    id: ${device_type}_Time_point_2_capacity
                    value: !lambda |-
                        return id(target_soc);
                - delay: 1s
                - number.set:
                    id: ${device_type}_Time_point_3_capacity
                    value: !lambda |-
                        return id(target_soc);
                - delay: 1s
                - number.set:
                    id: ${device_type}_Time_point_4_capacity
                    value: !lambda |-
                        return id(target_soc);
                - delay: 1s
                - number.set:
                    id: ${device_type}_Time_point_5_capacity
                    value: !lambda |-
                        return id(target_soc);
                - delay: 1s
                - number.set:
                    id: ${device_type}_Time_point_6_capacity
                    value: !lambda |-
                        return id(target_soc);        


select:
  - platform: template
    name: BatteryMode
    id: batterymode
    options:
     - "Normal"
     - "Hold"
     - "Charge"
    initial_option: "Normal"
    optimistic: true
    on_value:
      then:
        - delay: 200ms      
        - number.set:
            id: ${device_type}_Maximum_battery_discharge_current
            value: !lambda |-
              if (id(batterymode).current_option() == "Normal") {
                ESP_LOGI("Battery Mode", "Mode: %s with current of: %dA", "Normal", abs(id(helper_discharge_current)));
                return abs(id(helper_discharge_current));
              } else if (id(batterymode).current_option() == "Hold") {
                ESP_LOGI("Battery Mode", "Mode: %s with current of: %dA", "Hold", 5);
                return 5;
              } else if (id(batterymode).current_option() == "Charge") {
                ESP_LOGD("Battery Mode", "Charge selected, not implemented!");
                return abs(id(helper_discharge_current));                
              }
              return 5;
        # Add verification after write
        - delay: 500ms
        - lambda: |-
            ESP_LOGI("Battery Mode", "Current discharge setting: %.0fA", id(${device_type}_Maximum_battery_discharge_current).state);              
# curl -X POST -d "" "http://esp32-sandbox.local/select/batterymode/set?option=Hold"
captive_portal:
#mqtt:
#  broker: !secret mqtt_host
#  port: 1883
#  topic_prefix: pv/deye10k
#  username: !secret mqtt_username
#  password: !secret mqtt_password
#  id: mqtt_client


uart:
  - id: uartdeye
    tx_pin: 27
    rx_pin: 26
    baud_rate: 9600
    rx_buffer_size: 256

  - id: seplos
    tx_pin: GPIO17
    rx_pin: GPIO16
    baud_rate: 19200
    rx_buffer_size: 2048

modbus:
  - id: modbus1
    uart_id: uartdeye

modbus_controller:
  - id: ${modbus_controller_id}
    address: 0x01
    modbus_id: modbus1
    setup_priority: -10
    update_interval: ${modbus_update_interval}
    command_throttle: ${query_throttle}


seplos_parser:
  id: seplos_v3
  bms_count: 2  # Anzahl der Akku's (max. 16)
  update_interval: ${time}
  uart_id: seplos  # SeplosParser verwendet diese UART ID

sensor:
  - platform: template
    name: "Today Max SoC"
    unit_of_measurement: "%"
    device_class: battery
    state_class: measurement
    id: max_soc_sensor
    lambda: |-
      return id(max_soc);
  - platform: template
    name: "Target SoC"
    unit_of_measurement: "%"
    device_class: battery
    state_class: measurement
    id: target_soc_sensor
    lambda: |-
      return id(target_soc);
      
